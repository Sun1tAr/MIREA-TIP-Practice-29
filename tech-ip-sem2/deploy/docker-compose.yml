name: tip-practice-29
services:
  postgres:
    image: postgres:15-alpine
    container_name: tasks-db
    environment:
      POSTGRES_USER: tasks_user
      POSTGRES_PASSWORD: tasks_pass
      POSTGRES_DB: tasks_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasks_user -d tasks_db"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: tasks-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  auth:
    build:
      context: ../services/auth
      dockerfile: Dockerfile
    container_name: auth-service
    environment:
      AUTH_HTTP_PORT: 8081
      AUTH_GRPC_PORT: 50051
      LOG_LEVEL: info
    ports:
      - "8081:8081"
      - "50051:50051"
    networks:
      - app-network
    restart: unless-stopped

  tasks:
    build:
      context: ../services/tasks
      dockerfile: Dockerfile
    container_name: tasks-service
    environment:
      TASKS_PORT: 8082
      AUTH_GRPC_ADDR: auth:50051
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: tasks_user
      DB_PASSWORD: tasks_pass
      DB_NAME: tasks_db
      DB_DRIVER: postgres
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: 0
      CACHE_TTL_SECONDS: 120
      CACHE_TTL_JITTER_SECONDS: 30
      # RabbitMQ
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      RABBITMQ_QUEUE: task_events
      LOG_LEVEL: debug
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      auth:
        condition: service_started
    networks:
      - app-network

  graphql:
    build:
      context: ../services/graphql
      dockerfile: Dockerfile
    container_name: graphql-service
    environment:
      GRAPHQL_PORT: 8090
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: tasks_user
      DB_PASSWORD: tasks_pass
      DB_NAME: tasks_db
      DB_DRIVER: postgres
      LOG_LEVEL: debug
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  worker:
    build:
      context: ../services/worker
      dockerfile: Dockerfile
    container_name: worker-service
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      RABBITMQ_QUEUE: task_events
      RABBITMQ_PREFETCH: 1
      LOG_LEVEL: debug
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data: