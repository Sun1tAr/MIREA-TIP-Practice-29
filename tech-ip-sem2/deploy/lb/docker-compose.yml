version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tasks-db
    environment:
      POSTGRES_USER: tasks_user
      POSTGRES_PASSWORD: tasks_pass
      POSTGRES_DB: tasks_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasks_user -d tasks_db"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: tasks-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  auth:
    build:
      context: ../../services/auth
      dockerfile: Dockerfile
    container_name: auth-service
    environment:
      AUTH_HTTP_PORT: 8081
      AUTH_GRPC_PORT: 50051
      LOG_LEVEL: info
    ports:
      - "8081:8081"
      - "50051:50051"
    networks:
      - app-network
    restart: unless-stopped

  tasks_1:
    build:
      context: ../../services/tasks
      dockerfile: Dockerfile
    container_name: tasks-service-1
    environment:
      TASKS_PORT: 8082
      INSTANCE_ID: tasks-1
      AUTH_GRPC_ADDR: auth:50051
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: tasks_user
      DB_PASSWORD: tasks_pass
      DB_NAME: tasks_db
      DB_DRIVER: postgres
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: 0
      CACHE_TTL_SECONDS: 120
      CACHE_TTL_JITTER_SECONDS: 30
      LOG_LEVEL: debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

  tasks_2:
    build:
      context: ../../services/tasks
      dockerfile: Dockerfile
    container_name: tasks-service-2
    environment:
      TASKS_PORT: 8082
      INSTANCE_ID: tasks-2
      AUTH_GRPC_ADDR: auth:50051
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: tasks_user
      DB_PASSWORD: tasks_pass
      DB_NAME: tasks_db
      DB_DRIVER: postgres
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: 0
      CACHE_TTL_SECONDS: 120
      CACHE_TTL_JITTER_SECONDS: 30
      LOG_LEVEL: debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

  tasks_3:
    build:
      context: ../../services/tasks
      dockerfile: Dockerfile
    container_name: tasks-service-3
    environment:
      TASKS_PORT: 8082
      INSTANCE_ID: tasks-3
      AUTH_GRPC_ADDR: auth:50051
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: tasks_user
      DB_PASSWORD: tasks_pass
      DB_NAME: tasks_db
      DB_DRIVER: postgres
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: 0
      CACHE_TTL_SECONDS: 120
      CACHE_TTL_JITTER_SECONDS: 30
      LOG_LEVEL: debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: tasks-lb
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - tasks_1
      - tasks_2
      - tasks_3
    networks:
      - app-network
    restart: unless-stopped

  graphql:
    build:
      context: ../../services/graphql
      dockerfile: Dockerfile
    container_name: graphql-service
    environment:
      GRAPHQL_PORT: 8090
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: tasks_user
      DB_PASSWORD: tasks_pass
      DB_NAME: tasks_db
      DB_DRIVER: postgres
      LOG_LEVEL: debug
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: